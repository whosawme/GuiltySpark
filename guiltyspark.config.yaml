# GuiltySpark Configuration
# Controls which PII categories are detected and replaced

ollama:
  baseUrl: "http://localhost:11434"
  model: "gemma3:4b"          # Model to use for NER
  timeout: 30000              # ms
  ner_confidence_threshold: 0.6

# ── Substitution mode ──────────────────────────────────────────────────────────
# "realistic" (default): replace PII with realistic-looking synthetic values
#   e.g. "John Smith" → "Marcus Chen", "555-123-4567" → "(412) 876-2391"
#   Preserves LLM reasoning quality because the data still looks natural.
#
# "obvious": replace with bracketed placeholder labels
#   e.g. "John Smith" → "[PERSON_NAME_0]", "555-123-4567" → "[PHONE_0]"
#   Useful for auditing, debugging, or when you want to see exactly what's redacted.
#   Both modes maintain consistency (same entity → same placeholder within a session)
#   and support full response decoding.
substitution_mode: "realistic"

protect:
  - PERSON_NAME
  - EMAIL
  - PHONE
  - SSN
  - CREDIT_CARD
  - API_KEY
  - IP_ADDRESS
  - DATE_OF_BIRTH
  - ADDRESS
  - FINANCIAL_ACCOUNT

allow: []
  # - COMPANY_NAME  # uncomment to allow company names through

# ── Legacy simple patterns (still supported) ──────────────────────────────────
custom_patterns: []
  # - pattern: "\\b10\\.0\\.\\d+\\.\\d+\\b"
  #   label: INTERNAL_IP

# ── User-nominated custom entity types ────────────────────────────────────────
# Define your own sensitive data categories. Each entry can combine:
#   - regex patterns for fast stage-1 detection
#   - natural language description + examples injected into the Ollama NER prompt
#   - replacement_type: which built-in generator to use in "realistic" mode
#     (omit to always use bracketed placeholders, even in realistic mode)
#
# Example entries (uncomment to activate):
custom_entities: []
  # - name: "Project Codename"
  #   label: "CODENAME"
  #   description: "Internal project codenames used within the organization"
  #   examples: ["Project Nightingale", "Project Falcon", "Operation Atlas"]
  #   patterns:
  #     - "Project (Nightingale|Falcon|Atlas|Mercury)"
  #     - "Operation [A-Z][a-z]+"
  #   replacement_type: COMPANY_INTERNAL   # use company-name generator in realistic mode
  #
  # - name: "Employee ID"
  #   label: "EMPLOYEE_ID"
  #   description: "Internal employee identifiers in the format EMP-NNNNN"
  #   examples: ["EMP-00123", "EMP-98765"]
  #   patterns:
  #     - "\\bEMP-\\d{5}\\b"
  #   # no replacement_type → always generates [EMPLOYEE_ID_N]
  #
  # - name: "Internal IP"
  #   label: "INTERNAL_IP"
  #   description: "Internal network IP addresses in the 10.0.x.x range"
  #   patterns:
  #     - "\\b10\\.0\\.\\d{1,3}\\.\\d{1,3}\\b"
  #   replacement_type: IP_ADDRESS

passthrough_if_local: false   # set true to skip sanitization for local LLMs

# ── HTTP Proxy adapter ─────────────────────────────────────────────────────────
# Start with: node dist/proxy.js
# Then point any OpenAI/Anthropic-compatible tool at http://localhost:8787
# e.g. OPENAI_BASE_URL=http://localhost:8787/v1 openai-codex "..."
proxy:
  port: 8787
  # anthropic_base_url: "https://api.anthropic.com"   # override if needed
  # openai_base_url: "https://api.openai.com"

session:
  timeout_ms: 3600000         # 1 hour
  max_entries: 10000          # max substitution map entries per session
